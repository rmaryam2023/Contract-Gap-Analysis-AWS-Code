<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSA Compliance Dashboard - Dataminr</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="dataminr-favicon.png">
    <style>
        :root {
            --cyan: #00c8ff;
            --cyan-dim: rgba(0, 200, 255, 0.18);
            --cyan-border: rgba(0, 200, 255, 0.25);
            --bg-deep: #060c14;
            --bg-panel: rgba(8, 16, 28, 0.92);
            --bg-card: rgba(10, 20, 36, 0.85);
            --text: #d4e4f0;
            --text-muted: #5a7a96;
            --red: #ff3b4e;
            --yellow: #ffb300;
            --green: #00e5a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Sans', -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(0, 200, 255, 0.5);
            border-radius: 0;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0.5);
                opacity: 0;
            }
        }

        .network-line {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(0, 200, 255, 0.2), 
                transparent);
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* Main Container */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Header with Logo Space */
        header {
            background: var(--bg-panel);
            backdrop-filter: blur(24px);
            border: 1px solid var(--cyan-border);
            border-top: 2px solid var(--cyan);
            border-radius: 0;
            padding: 20px 32px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 40px rgba(0, 0, 0, 0.6), 0 0 0 0 transparent;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(0, 200, 255, 0.04), 
                transparent);
            animation: shimmer 4s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        /* Inline SVG logo - seamless Dataminr mark */
        .logo-mark {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
        }

        .logo-wordmark {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .logo-name {
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 19px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .logo-sub {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 8.5px;
            font-weight: 500;
            color: var(--cyan);
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .header-content {
            flex: 1;
            margin-left: 32px;
        }

        h1 {
            font-size: 26px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
            font-family: 'IBM Plex Sans', sans-serif;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 400;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .refresh-btn {
            background: transparent;
            color: var(--cyan);
            border: 1px solid var(--cyan);
            padding: 10px 22px;
            border-radius: 0;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn:hover {
            background: var(--cyan-dim);
            box-shadow: 0 0 16px rgba(0, 200, 255, 0.2);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--cyan-border);
            border-radius: 0;
            border-left: 3px solid var(--cyan);
            padding: 24px 28px;
            position: relative;
            overflow: hidden;
            transition: all 0.25s ease;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--cyan);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }

        .stat-card:hover::before {
            transform: scaleX(1);
        }

        .stat-card:hover {
            background: rgba(0, 200, 255, 0.04);
            border-color: rgba(0, 200, 255, 0.4);
            box-shadow: 0 0 24px rgba(0, 200, 255, 0.1);
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 14px;
            font-weight: 500;
            font-family: 'IBM Plex Mono', monospace;
        }

        .stat-value {
            font-size: 44px;
            font-weight: 700;
            line-height: 1;
            color: var(--cyan);
            font-family: 'IBM Plex Mono', monospace;
        }

        .stat-value.compliance-rate { color: var(--yellow); }
        .stat-value.high-risk { color: var(--red); }
        .stat-value.fully-compliant { color: var(--green); }

        /* Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        /* Panel */
        .panel {
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--cyan-border);
            border-top: 2px solid rgba(0, 200, 255, 0.4);
            border-radius: 0;
            padding: 28px 32px;
            box-shadow: 0 4px 32px rgba(0, 0, 0, 0.5);
        }

        .panel-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--cyan);
            margin-bottom: 24px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(0, 200, 255, 0.15);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-family: 'IBM Plex Mono', monospace;
        }

        /* Jurisdiction Bars */
        .jurisdiction-item {
            margin-bottom: 22px;
        }

        .jurisdiction-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .jurisdiction-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'IBM Plex Mono', monospace;
        }

        .jurisdiction-count {
            font-size: 10px;
            color: var(--text-muted);
            font-family: 'IBM Plex Mono', monospace;
            margin-left: 6px;
        }

        .jurisdiction-rate {
            font-size: 13px;
            font-weight: 700;
            color: var(--cyan);
            font-family: 'IBM Plex Mono', monospace;
        }

        .progress-bar {
            height: 24px;
            background: rgba(0, 200, 255, 0.04);
            border-radius: 0;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(0, 200, 255, 0.12);
        }

        .progress-fill {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-size: 11px;
            font-weight: 700;
            color: rgba(255,255,255,0.9);
            font-family: 'IBM Plex Mono', monospace;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 0;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.15), 
                transparent);
            animation: progress-shimmer 2s infinite;
        }

        @keyframes progress-shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* Recent Analyses */
        .recent-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            margin-bottom: 8px;
            background: rgba(0, 200, 255, 0.02);
            border-radius: 0;
            border-left: 2px solid rgba(0, 200, 255, 0.35);
            border-bottom: 1px solid rgba(0, 200, 255, 0.08);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .recent-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0%;
            height: 100%;
            background: rgba(0, 200, 255, 0.04);
            transition: width 0.2s ease;
        }

        .recent-item:hover::before {
            width: 100%;
        }

        .recent-item:hover {
            background: rgba(0, 200, 255, 0.05);
            border-left-color: var(--cyan);
        }

        .recent-info {
            flex: 1;
        }

        .recent-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 4px;
            font-family: 'IBM Plex Sans', sans-serif;
        }

        .recent-meta {
            font-size: 10px;
            color: var(--text-muted);
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 1px;
        }

        .compliance-badge {
            padding: 6px 14px;
            border-radius: 0;
            font-size: 12px;
            font-weight: 700;
            min-width: 72px;
            text-align: center;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 0.5px;
        }

        .compliance-badge.high { 
            background: rgba(255, 59, 78, 0.1); 
            color: #ff6b7a;
            border: 1px solid rgba(255, 59, 78, 0.3);
        }
        .compliance-badge.medium { 
            background: rgba(255, 179, 0, 0.1); 
            color: #ffc840;
            border: 1px solid rgba(255, 179, 0, 0.3);
        }
        .compliance-badge.good { 
            background: rgba(0, 229, 160, 0.1); 
            color: #00e5a0;
            border: 1px solid rgba(0, 229, 160, 0.3);
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 12px;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 1px;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 16px;
            height: 16px;
            margin-left: 10px;
            border: 1px solid rgba(0, 200, 255, 0.2);
            border-top-color: var(--cyan);
            border-radius: 0;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
                padding: 20px;
            }

            .logo-container img {
                height: 28px;
            }

            .header-content {
                margin-left: 0;
            }

            h1 {
                font-size: 18px;
            }

            .subtitle {
                font-size: 10px;
            }

            .refresh-btn {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 640px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            
            .stat-value {
                font-size: 32px;
            }

            .stat-card {
                padding: 16px 18px;
            }

            .container {
                padding: 12px;
            }
        }

        @media (max-width: 400px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg" id="animatedBg"></div>

    <div class="container">
        <header>
            <div class="logo-container" id="logoContainer">
                <img 
                    src="https://companieslogo.com/img/orig/dataminr_BIG.D-fbd500c2.png?t=1720244494" 
                    alt="Dataminr" 
                    style="height: 36px; width: auto; object-fit: contain;"
                    onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='flex';"
                >
                <!-- Fallback if image fails to load -->
                <div id="logoFallback" style="display:none; align-items:center; gap:8px;">
                    <span class="logo-name">Dataminr</span>
                    <span class="logo-sub" style="margin-top:0; margin-left:4px;">↗</span>
                </div>
            </div>
            <div class="header-content">
                <h1>MSA Compliance Dashboard</h1>
                <p class="subtitle">Real-time compliance analysis across all jurisdictions</p>
            </div>
            <button class="refresh-btn" onclick="loadDashboard()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
                </svg>
                Refresh
            </button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total MSAs Analyzed</div>
                <div class="stat-value" id="total-msas">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Overall Compliance Rate</div>
                <div class="stat-value compliance-rate" id="compliance-rate">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">High Risk Issues</div>
                <div class="stat-value high-risk" id="high-risk">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Fully Compliant</div>
                <div class="stat-value fully-compliant" id="fully-compliant">-</div>
            </div>
        </div>

        <div class="content-grid">
            <div class="panel">
                <h2 class="panel-title">Compliance by Jurisdiction</h2>
                <div id="jurisdiction-list">
                    <div class="loading">Loading jurisdictions</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2 class="panel-title">Recent Analyses (Last 20)</h2>
            <div id="recent-analyses">
                <div class="loading">Loading recent analyses</div>
            </div>
        </div>
    </div>

    <script>
        // Create animated background
        function createAnimatedBackground() {
            const bg = document.getElementById('animatedBg');
            
            // Create particles
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'px');
                particle.style.setProperty('--ty', (Math.random() - 0.5) * 200 + 'px');
                particle.style.animationDelay = Math.random() * 20 + 's';
                bg.appendChild(particle);
            }

            // Create network lines
            for (let i = 0; i < 15; i++) {
                const line = document.createElement('div');
                line.className = 'network-line';
                line.style.left = Math.random() * 100 + '%';
                line.style.top = Math.random() * 100 + '%';
                line.style.width = Math.random() * 300 + 100 + 'px';
                line.style.transform = `rotate(${Math.random() * 360}deg)`;
                line.style.animationDelay = Math.random() * 3 + 's';
                bg.appendChild(line);
            }
        }

        createAnimatedBackground();

        const API_URL = 'https://ekkn40c2kg.execute-api.us-east-1.amazonaws.com/prod/metrics';

        async function loadDashboard() {
            try {
                const response = await fetch(API_URL);
                const rawData = await response.json();
                const data = typeof rawData.body === 'string' ? JSON.parse(rawData.body) : rawData;
                
                updateStats(data);
                updateJurisdictions(data);
                updateRecentAnalyses(data);
            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('jurisdiction-list').innerHTML = 
                    '<p style="color: #f87171; text-align: center;">Error loading data. Please refresh.</p>';
            }
        }

        function updateStats(data) {
            document.getElementById('total-msas').textContent = data.totalMSAs || 0;
            document.getElementById('compliance-rate').textContent = 
                Math.round(data.overallComplianceRate || 0) + '%';
            document.getElementById('high-risk').textContent = data.highRiskIssues || 0;
            document.getElementById('fully-compliant').textContent = data.fullyCompliant || 0;
        }

        function updateJurisdictions(data) {
            const container = document.getElementById('jurisdiction-list');
            
            if (!data.byJurisdiction || data.byJurisdiction.length === 0) {
                container.innerHTML = '<p style="color: #94a3b8; text-align: center;">No jurisdiction data available</p>';
                return;
            }

            container.innerHTML = data.byJurisdiction.map(item => {
                const rate = Math.round(item.compliance_rate || 0);
                const color = getJurisdictionColor(item.jurisdiction);
                
                return `
                    <div class="jurisdiction-item">
                        <div class="jurisdiction-header">
                            <div>
                                <span class="jurisdiction-name">${item.jurisdiction}</span>
                                <span class="jurisdiction-count">(${item.count} MSA${item.count !== 1 ? 's' : ''})</span>
                            </div>
                            <span class="jurisdiction-rate">${rate}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${rate}%; background: ${color};">
                                ${rate}%
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateRecentAnalyses(data) {
            const container = document.getElementById('recent-analyses');
            
            if (!data.recentAnalyses || data.recentAnalyses.length === 0) {
                container.innerHTML = '<p style="color: #94a3b8; text-align: center;">No recent analyses</p>';
                return;
            }

            container.innerHTML = data.recentAnalyses.map(item => {
                const rate = Math.round(item.compliance_rate || 0);
                const badgeClass = rate >= 80 ? 'good' : rate >= 50 ? 'medium' : 'high';
                const statusIcon = rate >= 80 ? '✓' : rate >= 50 ? '!' : '✕';
                
                return `
                    <div class="recent-item">
                        <div class="recent-info">
                            <div class="recent-name">${item.msa_name}</div>
                            <div class="recent-meta">
                                ${item.jurisdiction.toUpperCase()} • ${formatTime(item.timestamp)}
                            </div>
                        </div>
                        <div class="compliance-badge ${badgeClass}">
                            ${statusIcon} ${rate}%
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getJurisdictionColor(jurisdiction) {
            const colors = {
                'UK': 'linear-gradient(90deg, #0069c0, #00c8ff)',
                'INDIA': 'linear-gradient(90deg, #00804a, #00e5a0)',
                'AUSTRALIA': 'linear-gradient(90deg, #005fa3, #00c8ff)',
                'CANADA': 'linear-gradient(90deg, #8a0000, #ff3b4e)',
                'US': 'linear-gradient(90deg, #8a5000, #ffb300)'
            };
            return colors[jurisdiction] || 'linear-gradient(90deg, #004e6e, #00c8ff)';
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);
            
            if (seconds < 60) return 'Just now';
            if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
            if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
            if (seconds < 604800) return Math.floor(seconds / 86400) + 'd ago';
            return date.toLocaleDateString();
        }

        // Load dashboard on page load
        loadDashboard();
    </script>
</body>
</html>
